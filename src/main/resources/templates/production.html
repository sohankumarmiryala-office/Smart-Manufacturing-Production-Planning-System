<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Orders</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

    <nav class="sidebar">
        <div class="sidebar-brand">
            <i class='bx bx-cog bx-spin'></i>
            <span>SmartFactory</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html"><i class='bx bxs-dashboard'></i> Dashboard</a></li>
            <li><a href="product.html"><i class='bx bx-package'></i> Product Master</a></li>
            <li><a href="production.html" class="active"><i class='bx bx-barcode-reader'></i> Production Orders</a></li>
            <li><a href="machine.html"><i class='bx bx-broadcast'></i> Machine Monitoring</a></li>
            <li><a href="quality.html"><i class='bx bx-check-shield'></i> Quality Inspection</a></li>
            <li><a href="maintenance.html"><i class='bx bx-wrench'></i> Maintenance Orders</a></li>
            <li><a href="user.html"><i class='bx bx-user-pin'></i> User Management</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <h1>Production Operations</h1>
            <div class="user-profile">
                <i class='bx bx-user-circle'></i>
                <span>Admin User</span>
            </div>
        </header>

        <div class="content-body">
            <section class="view-section active">
                <div class="form-card">
                    <h2><i class='bx bx-barcode-reader'></i> Create Production Order</h2>
                    <form class="factory-form" id="productionForm">

                        <div class="form-group">
                            <label>Product ID</label>
                            <input type="number" name="productId" placeholder="Enter Product ID" required>
                        </div>

                        <div class="form-group">
                            <label>Planned Quantity</label>
                            <input type="number" name="plannedQuantity" min="1" placeholder="Target Units" required>
                        </div>

                        <div class="form-group">
                            <label>Produced Quantity</label>
                            <input type="number" name="producedQuantity" value="0" readonly>
                        </div>

                        <div class="form-group">
                            <label>Start Date</label>
                            <input type="date" name="startDate" required>
                        </div>

                        <div class="form-group">
                            <label>End Date</label>
                            <input type="date" name="endDate" required>
                        </div>

                        <div class="form-group">
                            <label>Order Status</label>
                            <select name="orderStatus" required>
                                <option value="PLANNED">PLANNED</option>
                                <option value="RELEASED">RELEASED</option>
                                <option value="IN_PROGRESS">IN_PROGRESS</option>
                                <option value="COMPLETED">COMPLETED</option>
                                <option value="CANCELLED">CANCELLED</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary">
                            Launch Production Order
                        </button>

                    </form>
                </div>
            </section>
        </div>
    </main>

    <div id="toast-notification" class="toast hidden"></div>
    <script src="../static/js/script.js"></script>
</body>

</html>
